<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link's Fairy - Configuracion</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #f3f5fa;
        color: #1b273a;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #d8deea;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(26, 39, 62, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 18px;
        color: #3d4e69;
      }

      .field {
        display: block;
        margin-bottom: 14px;
      }

      .field span {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input[type="password"],
      input[type="text"],
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bcc8dc;
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 14px;
        background: #ffffff;
        color: #1b273a;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .toggle-label {
        color: #425472;
        font-size: 13px;
        font-weight: 600;
      }

      .toggle {
        position: relative;
        display: inline-flex;
        width: 44px;
        height: 26px;
        flex: 0 0 auto;
      }

      .toggle-input {
        position: absolute;
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      .toggle-slider {
        position: relative;
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 999px;
        background: #d2d8e4;
        border: 1px solid #c3ccdb;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }

      .toggle-slider::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 1px 4px rgba(24, 35, 56, 0.28);
        transition: transform 0.2s ease;
      }

      .toggle-input:checked + .toggle-slider {
        background: #1359a2;
        border-color: #1359a2;
      }

      .toggle-input:checked + .toggle-slider::after {
        transform: translateX(18px);
      }

      .toggle-input:focus-visible + .toggle-slider {
        outline: 2px solid #89b0e0;
        outline-offset: 2px;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 14px;
        cursor: pointer;
      }

      #save-button {
        background: #1359a2;
        color: #ffffff;
      }

      #status {
        margin-top: 14px;
        min-height: 20px;
        font-size: 13px;
      }

      #status.ok {
        color: #17673a;
      }

      #status.error {
        color: #9a1d1d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="settings-title">Configuracion de Link's Fairy</h1>
      <p id="settings-intro">
        Linksfairy usa la clave segura del backend. Configura solo opciones de interfaz y funciones avanzadas.
      </p>

      <form id="settings-form">
        <label class="field" for="ui-language">
          <span id="ui-language-label">Idioma de Linksfairy</span>
          <select id="ui-language" name="uiLanguage">
            <option value="auto">Automatico (idioma del navegador)</option>
            <option value="es">Espanol</option>
            <option value="en">English</option>
            <option value="pt">Portugues</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="ca">Catala</option>
          </select>
        </label>

        <div class="toggle-row">
          <span id="auto-reject-cookies-label" class="toggle-label">Auto-rechazar cookies</span>
          <label class="toggle" for="auto-reject-cookies">
            <input id="auto-reject-cookies" class="toggle-input" type="checkbox" />
            <span class="toggle-slider" aria-hidden="true"></span>
          </label>
        </div>

        <div class="toggle-row">
          <span id="block-notifications-label" class="toggle-label">Bloquear notificaciones web</span>
          <label class="toggle" for="block-notifications">
            <input id="block-notifications" class="toggle-input" type="checkbox" />
            <span class="toggle-slider" aria-hidden="true"></span>
          </label>
        </div>

        <div class="toggle-row">
          <span id="advanced-feedback-mode-label" class="toggle-label">Modo avanzado</span>
          <label class="toggle" for="advanced-feedback-mode">
            <input id="advanced-feedback-mode" class="toggle-input" type="checkbox" />
            <span class="toggle-slider" aria-hidden="true"></span>
          </label>
        </div>

        <div class="actions">
          <button id="save-button" type="submit">Guardar configuracion</button>
        </div>
      </form>

      <div id="status" role="status" aria-live="polite"></div>
    </main>

    <script src="scripts/options.js"></script>
  </body>
</html>
