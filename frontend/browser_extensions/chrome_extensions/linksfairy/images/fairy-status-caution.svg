  <!-- Orbe -->
  <g filter="url(#softGlow)">
    <circle cx="130" cy="110" r="54" fill="url(#orbYellow)"/>
    <ellipse cx="112" cy="92" rx="22" ry="18" fill="#ffffff" opacity="0.55"/>
    <ellipse cx="120" cy="100" rx="10" ry="8" fill="#ffffff" opacity="0.35"/>
